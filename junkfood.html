<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteDash | Guilty Pleasures</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100vh; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #ffc107; }

        .food-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: radial-gradient(circle at center, #ffca28, #ffb300);
        }

        .main-card {
            width: 90%;
            max-width: 1100px;
            height: 80vh;
            background: #1a1a1a; /* Dark theme for bold look */
            border-radius: 40px;
            display: flex;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 4px solid #fff;
        }

        /* Left Side: Information */
        .info-panel {
            flex: 1.2;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
        }

        .badge {
            background: #ff5252;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            width: fit-content;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            font-family: 'Bungee', cursive;
            font-size: 4rem;
            color: #ffc107;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0px #ff5252;
        }

        p {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .order-btn {
            padding: 18px 40px;
            background: #ff5252;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 10px 0px #b71c1c;
            transition: 0.2s;
            width: fit-content;
            text-align: center;
        }

        .order-btn:hover { 
            transform: translateY(3px); 
            box-shadow: 0 5px 0px #b71c1c;
            background: #ff1744;
        }

        /* Right Side: Visuals */
        .visual-panel {
            flex: 1;
            background: #252525;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .food-img {
            width: 140%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=1500') no-repeat center center/cover;
            transform: scale(1.2) rotate(-5deg);
            transition: 0.5s;
        }

        .main-card:hover .food-img {
            transform: scale(1.3) rotate(0deg);
        }

        /* Promo Tag */
        .promo-tag {
            position: absolute;
            bottom: 15%;
            right: 10%;
            background: #ffc107;
            color: #1a1a1a;
            padding: 20px;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            transform: rotate(15deg);
            border: 4px dashed #1a1a1a;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="food-wrapper">
        <div class="main-card">
            <div class="info-panel">
                <span class="badge">🔥 Best in Town</span>
                <h1>Cheesy <br>Overload.</h1>
                <p>No regrets, just great taste. Dive into the world of extra cheese, crispy fries, and the juiciest burgers you've ever had.</p>
                
                <a href="#" class="order-btn">Grab a Bite</a>
            </div>

            <div class="visual-panel">
                <div class="food-img"></div>
                <div class="promo-tag">
                    <p style="font-size: 0.8rem; margin:0;">ONLY</p>
                    <p style="font-size: 1.5rem; margin:0;">$9</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
